<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunor Scanner — World's #1 Roblox Backdoor Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#010208;--bg2:#05091a;--c:#00f5ff;--b:#1a5fff;--g:#00ff88;
  --r:#ff1a3c;--o:#ff6600;--a:#ffd000;--pk:#ff0088;--pu:#7700ff;
  --gold:#ffcc00;--bdr:rgba(0,245,255,0.14);--card:rgba(0,245,255,0.03);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:#ddeeff;font-family:'Rajdhani',sans-serif;overflow-x:hidden;cursor:none;}

/* ─── CUSTOM CURSOR ─── */
#CUR{position:fixed;pointer-events:none;z-index:9999;top:0;left:0;width:30px;height:30px;transform:translate(-15px,-15px);}
#CUR .ring{width:30px;height:30px;border:1.5px solid var(--c);border-radius:50%;transition:all .12s ease;box-shadow:0 0 10px rgba(0,245,255,.3);}
#CUR .dot{width:5px;height:5px;background:var(--c);border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 8px var(--c);}
#CUR.clicking .ring{transform:scale(.7);border-color:var(--pk);}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:linear-gradient(var(--c),var(--pk),var(--pu));border-radius:2px;}

/* ─── BG CANVAS ─── */
#BG{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* ─── SCANLINES ─── */
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);z-index:900;pointer-events:none;}

/* ─── NAV ─── */
nav{position:fixed;top:0;left:0;right:0;z-index:800;height:64px;background:rgba(1,2,8,.96);backdrop-filter:blur(40px);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;}
.nav-line{position:absolute;bottom:0;left:-100%;right:100%;height:2px;background:linear-gradient(90deg,transparent,var(--c),var(--pk),var(--pu),var(--c),transparent);animation:navline 3s ease-in-out infinite;}
@keyframes navline{0%{left:-100%;right:100%;}50%{left:0%;right:0%;}100%{left:100%;right:-100%;}}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
.logo-shield{width:38px;height:38px;}
.logo-shield svg{filter:drop-shadow(0 0 14px var(--c));animation:shieldglow 2.5s ease-in-out infinite;}
@keyframes shieldglow{0%,100%{filter:drop-shadow(0 0 8px var(--c));}50%{filter:drop-shadow(0 0 25px var(--c)) drop-shadow(0 0 50px rgba(0,245,255,.5));}}
.logo-name{font-family:'Orbitron',sans-serif;font-size:1.15rem;font-weight:900;letter-spacing:3px;display:flex;align-items:baseline;gap:1px;}
.logo-name .L{color:#fff;}
.logo-name .U{background:linear-gradient(135deg,var(--c),var(--b));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-name .N{background:linear-gradient(135deg,var(--b),var(--pk));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-name .O{background:linear-gradient(135deg,var(--pk),var(--pu));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-name .R{background:linear-gradient(135deg,var(--pu),var(--c));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.nav-mid{display:flex;align-items:center;gap:.5rem;}
.pill{font-family:'Share Tech Mono',monospace;font-size:.58rem;letter-spacing:2px;padding:4px 12px;border-radius:50px;border:1px solid;display:flex;align-items:center;gap:6px;}
.pill.online{color:var(--g);border-color:rgba(0,255,136,.25);background:rgba(0,255,136,.06);}
.pill.online::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--g);box-shadow:0 0 8px var(--g);animation:blink .9s infinite;}
.pill.v{color:var(--c);border-color:rgba(0,245,255,.2);background:rgba(0,245,255,.04);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.15;}}
.nav-r{display:flex;gap:.5rem;}
.nb{font-family:'Orbitron',sans-serif;font-size:.58rem;font-weight:700;letter-spacing:1.5px;padding:8px 16px;border-radius:4px;cursor:none;position:relative;overflow:hidden;transition:all .15s;}
.nb.ghost{background:transparent;border:1px solid var(--bdr);color:rgba(200,230,255,.45);}
.nb.ghost:hover{border-color:var(--c);color:var(--c);transform:scale(1.06);box-shadow:0 0 16px rgba(0,245,255,.2);}
.nb.solid{background:linear-gradient(135deg,var(--b),var(--c));border:none;color:#000;font-weight:900;animation:solpulse 2.5s infinite;}
@keyframes solpulse{0%,100%{box-shadow:0 0 16px rgba(0,245,255,.4);}50%{box-shadow:0 0 40px rgba(0,245,255,.9),0 0 80px rgba(0,245,255,.2);}}
.nb.solid:hover{transform:scale(1.08);animation:none;box-shadow:0 0 60px rgba(0,245,255,1)!important;}
.nb:active{transform:scale(.91)!important;}
.rip{position:absolute;border-radius:50%;background:rgba(255,255,255,.28);transform:scale(0);animation:rip .5s;pointer-events:none;}
@keyframes rip{to{transform:scale(5);opacity:0;}}
section{position:relative;z-index:1;}

/* ─── HERO ─── */
#hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 2rem 4rem;text-align:center;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(120px);pointer-events:none;animation:orbf ease-in-out infinite;}
@keyframes orbf{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(20px,-30px) scale(1.1);}}
.orb1{width:600px;height:600px;background:radial-gradient(circle,rgba(0,245,255,.07),transparent);top:0;left:-10%;animation-duration:16s;}
.orb2{width:700px;height:700px;background:radial-gradient(circle,rgba(255,0,136,.05),transparent);top:20%;right:-15%;animation-duration:13s;animation-delay:-5s;}
.orb3{width:500px;height:500px;background:radial-gradient(circle,rgba(119,0,255,.06),transparent);bottom:5%;left:25%;animation-duration:20s;animation-delay:-8s;}
.orb4{width:400px;height:400px;background:radial-gradient(circle,rgba(26,95,255,.06),transparent);top:50%;left:5%;animation-duration:11s;animation-delay:-3s;}

/* HERO EYEBROW */
.eyebrow{font-family:'Share Tech Mono',monospace;font-size:.7rem;letter-spacing:6px;color:var(--c);margin-bottom:1.5rem;opacity:0;animation:fi .7s .1s both;display:flex;align-items:center;gap:14px;justify-content:center;}
.eyebrow::before,.eyebrow::after{content:'';flex:1;max-width:100px;height:1px;}
.eyebrow::before{background:linear-gradient(90deg,transparent,var(--c));}
.eyebrow::after{background:linear-gradient(270deg,transparent,var(--c));}
@keyframes fi{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}

/* MASSIVE TITLE */
.title-block{margin-bottom:.8rem;opacity:0;animation:fi .8s .2s both;}
.made-by{font-family:'Share Tech Mono',monospace;font-size:.72rem;letter-spacing:5px;color:rgba(200,230,255,.4);margin-bottom:.3rem;}
.t-LUNOR{font-family:'Orbitron',sans-serif;font-size:clamp(4.5rem,14vw,11rem);font-weight:900;line-height:.85;letter-spacing:-4px;position:relative;display:inline-block;}
.t-LUNOR-text{background:linear-gradient(165deg,#fff 0%,#fff 30%,var(--c) 60%,var(--b) 80%,var(--pk) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200%;animation:tgrad 6s ease infinite;filter:drop-shadow(0 0 40px rgba(0,245,255,.25));}
@keyframes tgrad{0%,100%{background-position:0%;}50%{background-position:100%;}}
/* GLITCH */
.t-LUNOR::before{content:'LUNOR';font-family:'Orbitron',sans-serif;font-size:inherit;font-weight:900;letter-spacing:-4px;position:absolute;left:-2px;top:0;background:linear-gradient(165deg,transparent 0%,var(--c) 50%,transparent 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;opacity:.2;animation:glA 5s infinite;clip-path:polygon(0 15%,100% 15%,100% 35%,0 35%);}
.t-LUNOR::after{content:'LUNOR';font-family:'Orbitron',sans-serif;font-size:inherit;font-weight:900;letter-spacing:-4px;position:absolute;left:2px;top:0;background:var(--pk);-webkit-background-clip:text;-webkit-text-fill-color:transparent;opacity:.15;animation:glB 5s infinite;clip-path:polygon(0 65%,100% 65%,100% 85%,0 85%);}
@keyframes glA{0%,90%,100%{transform:translate(0);opacity:.2;}91%{transform:translate(-5px,2px);opacity:.4;}93%{transform:translate(5px,-1px);opacity:.25;}95%{transform:translate(-3px);opacity:.35;}97%{transform:translate(0);opacity:.2;}}
@keyframes glB{0%,88%,100%{transform:translate(0);opacity:.15;}89%{transform:translate(5px,2px);opacity:.3;}91%{transform:translate(-4px);opacity:.2;}93%{transform:translate(3px,-2px);opacity:.28;}95%{transform:translate(0);opacity:.15;}}
.t-SCANNER{font-family:'Orbitron',sans-serif;font-size:clamp(1.4rem,4vw,3.5rem);font-weight:400;letter-spacing:16px;display:block;background:linear-gradient(90deg,var(--c),var(--b),var(--pk),var(--pu),var(--c));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:400%;animation:sgm 5s linear infinite;margin-top:.2rem;}
@keyframes sgm{from{background-position:0%;}to{background-position:400%;}}

/* WORLD #1 CLAIM */
.world1{font-family:'Orbitron',sans-serif;font-size:clamp(.7rem,1.8vw,.95rem);font-weight:900;letter-spacing:4px;color:var(--gold);padding:10px 28px;border:1px solid rgba(255,204,0,.35);border-radius:50px;background:rgba(255,204,0,.07);box-shadow:0 0 25px rgba(255,204,0,.12),inset 0 0 25px rgba(255,204,0,.03);display:inline-block;margin:.8rem 0;opacity:0;animation:fi .7s .4s both;position:relative;overflow:hidden;}
.world1::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,204,0,.15),transparent);animation:shimW 3s ease infinite;}
@keyframes shimW{to{left:200%;}}
.hero-sub{font-size:1.05rem;color:rgba(200,230,255,.48);letter-spacing:4px;margin-bottom:1.8rem;opacity:0;animation:fi .7s .5s both;}

/* BADGES */
.badges-row{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;margin-bottom:3rem;opacity:0;animation:fi .7s .6s both;}
.badge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:3px;font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:1.5px;border:1px solid;position:relative;overflow:hidden;transition:all .2s;}
.badge::before{content:'';position:absolute;inset:0;background:currentColor;opacity:.05;}
.badge:hover{transform:translateY(-2px);}
.badge.g{color:var(--g);border-color:rgba(0,255,136,.28);}
.badge.c{color:var(--c);border-color:rgba(0,245,255,.28);}
.badge.pk{color:var(--pk);border-color:rgba(255,0,136,.28);}
.badge.gd{color:var(--gold);border-color:rgba(255,204,0,.28);}
.badge.pu{color:var(--pu);border-color:rgba(119,0,255,.28);}
.badge .dot{width:5px;height:5px;border-radius:50%;background:currentColor;box-shadow:0 0 6px currentColor;animation:blink .9s infinite;flex-shrink:0;}

/* ─── THREAT METER BAR (NEW!) ─── */
.threat-meter{max-width:700px;width:100%;margin:0 auto 2.5rem;opacity:0;animation:fi .7s .7s both;}
.tm-label{font-family:'Orbitron',sans-serif;font-size:.65rem;letter-spacing:4px;color:rgba(200,230,255,.3);text-align:center;margin-bottom:.8rem;}
.tm-bar{height:8px;background:rgba(255,255,255,.04);border-radius:50px;overflow:visible;position:relative;border:1px solid var(--bdr);}
.tm-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,var(--g),var(--c),var(--b),var(--pk),var(--r));background-size:300%;animation:tmgl 3s linear infinite;width:0;transition:width 3s ease;position:relative;}
@keyframes tmgl{from{background-position:0%;}to{background-position:300%;}}
.tm-fill::after{content:'';position:absolute;right:-4px;top:-4px;width:16px;height:16px;border-radius:50%;background:var(--c);box-shadow:0 0 12px var(--c),0 0 24px rgba(0,245,255,.5);animation:tmglw 1s ease-in-out infinite;}
@keyframes tmglw{0%,100%{box-shadow:0 0 10px var(--c);}50%{box-shadow:0 0 20px var(--c),0 0 40px rgba(0,245,255,.6);}}
.tm-labels{display:flex;justify-content:space-between;margin-top:.5rem;font-family:'Share Tech Mono',monospace;font-size:.55rem;color:rgba(200,230,255,.2);}

/* ─── STATS GRID ─── */
.stats-outer{max-width:1000px;width:100%;opacity:0;animation:fi .7s .35s both;}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:1.2rem;margin-bottom:1.5rem;}
@media(max-width:750px){.sg{grid-template-columns:1fr;}}
.sc{background:rgba(5,9,26,.88);border:1px solid var(--bdr);border-radius:18px;padding:2rem 1.5rem;position:relative;overflow:hidden;transition:all .35s;backdrop-filter:blur(20px);cursor:none;}
.sc::after{content:'';position:absolute;inset:-1px;border-radius:18px;opacity:0;transition:opacity .3s;background:linear-gradient(135deg,rgba(0,245,255,.06),rgba(255,0,136,.04));pointer-events:none;}
.sc:hover{transform:translateY(-12px) scale(1.01);border-color:var(--c);box-shadow:0 40px 90px rgba(0,245,255,.13),0 0 0 1px rgba(0,245,255,.08);}
.sc:hover::after{opacity:1;}
.ck{position:absolute;width:14px;height:14px;border-color:var(--c);border-style:solid;opacity:0;transition:opacity .35s;}
.sc:hover .ck{opacity:.7;}
.ck.tl{top:10px;left:10px;border-width:2px 0 0 2px;}
.ck.tr{top:10px;right:10px;border-width:2px 2px 0 0;}
.ck.bl{bottom:10px;left:10px;border-width:0 0 2px 2px;}
.ck.br{bottom:10px;right:10px;border-width:0 2px 2px 0;}
.sc-lbl{font-family:'Share Tech Mono',monospace;font-size:.56rem;letter-spacing:3px;color:rgba(200,230,255,.3);margin-bottom:1.2rem;}
/* RING */
.ring-wrap{display:flex;justify-content:center;align-items:center;position:relative;width:130px;height:130px;margin:0 auto .8rem;}
.rsvg{position:absolute;top:0;left:0;width:130px;height:130px;}
.rbg{fill:none;stroke:rgba(255,255,255,.05);stroke-width:9;}
.rfg{fill:none;stroke-width:9;stroke-linecap:round;stroke-dasharray:272;stroke-dashoffset:272;transition:stroke-dashoffset 2.5s cubic-bezier(.4,0,.2,1);}
.rcenter{position:absolute;text-align:center;}
.rval{font-family:'Orbitron',sans-serif;font-size:1.8rem;font-weight:900;color:#fff;line-height:1;}
.runit{font-family:'Share Tech Mono',monospace;font-size:.52rem;letter-spacing:2px;color:rgba(200,230,255,.38);margin-top:4px;}
/* TRUST */
.bignum{font-family:'Orbitron',sans-serif;font-size:2.6rem;font-weight:900;color:#fff;line-height:1;}
.bigsub{font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:2px;color:rgba(200,230,255,.3);margin:.5rem 0;}
.mbar{background:rgba(255,255,255,.04);height:4px;border-radius:50px;overflow:hidden;margin-top:.8rem;}
.mbar-f{height:100%;width:0;background:linear-gradient(90deg,var(--b),var(--c),var(--pk));border-radius:50px;transition:width 2.8s ease;}
/* SEGS */
.segs{display:grid;grid-template-columns:repeat(10,1fr);gap:3px;margin:.6rem 0;}
.seg{height:20px;border-radius:3px;background:rgba(255,255,255,.05);}
.seg.lit{animation:seganim .22s ease forwards;}
@keyframes seganim{from{transform:scaleY(.3);opacity:0;}to{transform:scaleY(1);opacity:1;}}
.strtag{font-family:'Orbitron',sans-serif;font-size:1.05rem;font-weight:700;margin-top:.3rem;}
.strdesc{font-family:'Share Tech Mono',monospace;font-size:.55rem;letter-spacing:1px;color:rgba(200,230,255,.25);margin-top:.3rem;}

/* ─── LIVE COUNTERS ─── */
.live-wrap{max-width:1000px;width:100%;margin-bottom:2rem;opacity:0;animation:fi .7s 1s both;}
.live-ttl{font-family:'Share Tech Mono',monospace;font-size:.58rem;letter-spacing:5px;color:rgba(200,230,255,.22);text-align:center;margin-bottom:.8rem;}
.lg{display:grid;grid-template-columns:repeat(4,1fr);gap:.8rem;}
@media(max-width:600px){.lg{grid-template-columns:repeat(2,1fr);}}
.lc{background:rgba(5,9,26,.88);border:1px solid var(--bdr);border-radius:12px;padding:1rem;text-align:center;transition:all .25s;position:relative;overflow:hidden;cursor:none;}
.lc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;}
.lc.r::after{background:linear-gradient(90deg,transparent,var(--r),transparent);}
.lc.g::after{background:linear-gradient(90deg,transparent,var(--g),transparent);}
.lc.b::after{background:linear-gradient(90deg,transparent,var(--b),transparent);}
.lc.pk::after{background:linear-gradient(90deg,transparent,var(--pk),transparent);}
.lc:hover{transform:translateY(-6px);}
.lc.r:hover{border-color:var(--r);box-shadow:0 10px 35px rgba(255,26,60,.1);}
.lc.g:hover{border-color:var(--g);box-shadow:0 10px 35px rgba(0,255,136,.1);}
.lc.b:hover{border-color:var(--b);box-shadow:0 10px 35px rgba(26,95,255,.1);}
.lc.pk:hover{border-color:var(--pk);box-shadow:0 10px 35px rgba(255,0,136,.1);}
.lc-n{font-family:'Orbitron',sans-serif;font-size:1.4rem;font-weight:900;line-height:1.2;}
.lc.r .lc-n{color:var(--r);}
.lc.g .lc-n{color:var(--g);}
.lc.b .lc-n{color:var(--b);}
.lc.pk .lc-n{color:var(--pk);}
.lc-l{font-family:'Share Tech Mono',monospace;font-size:.55rem;letter-spacing:1.5px;color:rgba(200,230,255,.25);margin-top:4px;}
/* DELTA INDICATOR */
.lc-delta{font-family:'Share Tech Mono',monospace;font-size:.55rem;color:var(--g);margin-top:2px;min-height:14px;}

/* ─── ACTIVITY FEED ─── */
.act-wrap{max-width:700px;width:100%;margin:0 auto 2rem;opacity:0;animation:fi .7s 1.2s both;}
.panel{background:rgba(5,9,26,.9);border:1px solid var(--bdr);border-radius:14px;overflow:hidden;}
.ph{padding:10px 18px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;}
.ph-l{font-family:'Share Tech Mono',monospace;font-size:.58rem;letter-spacing:3px;color:rgba(200,230,255,.3);display:flex;align-items:center;gap:8px;}
.ph-l::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--g);box-shadow:0 0 8px var(--g);animation:blink .8s infinite;}
.ph-r{font-family:'Share Tech Mono',monospace;font-size:.52rem;letter-spacing:2px;color:rgba(200,230,255,.18);}
.al{height:152px;overflow:hidden;position:relative;}
.al::after{content:'';position:absolute;bottom:0;left:0;right:0;height:45px;background:linear-gradient(transparent,var(--bg2));pointer-events:none;}
.ai{padding:7px 18px;font-family:'Share Tech Mono',monospace;font-size:.7rem;opacity:0;animation:slideup .35s forwards;display:flex;align-items:center;gap:8px;}
@keyframes slideup{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.ai.ok{color:rgba(0,255,136,.82);}
.ai.w{color:rgba(255,102,0,.9);}
.ai.crit{color:rgba(255,26,60,.95);}
.ai .ts{color:rgba(200,230,255,.2);font-size:.6rem;margin-left:auto;}

/* ─── INTELLIGENCE FEATURES PANEL ─── */
.intel-wrap{max-width:1000px;width:100%;margin-bottom:2rem;opacity:0;animation:fi .7s 1.3s both;}
.intel-box{background:rgba(5,9,26,.9);border:1px solid rgba(0,245,255,.18);border-radius:16px;padding:1.4rem 1.8rem;position:relative;overflow:hidden;}
.intel-box::before{content:'LUNOR INTELLIGENCE ENGINE v5.0';position:absolute;top:12px;right:16px;font-family:'Share Tech Mono',monospace;font-size:.5rem;letter-spacing:2px;color:rgba(0,245,255,.18);}
.intel-box::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,245,255,.03),transparent,rgba(255,0,136,.02));pointer-events:none;}
.intel-title{font-family:'Orbitron',sans-serif;font-size:.68rem;letter-spacing:3px;color:var(--c);margin-bottom:1rem;display:flex;align-items:center;gap:8px;}
.intel-title::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--c);box-shadow:0 0 12px var(--c);animation:blink .8s infinite;}
.intel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:.5rem;}
.if{display:flex;align-items:center;gap:8px;padding:6px 10px;background:rgba(0,245,255,.03);border:1px solid rgba(0,245,255,.09);border-radius:6px;font-family:'Share Tech Mono',monospace;font-size:.62rem;color:rgba(200,230,255,.65);transition:all .2s;cursor:none;}
.if:hover{border-color:rgba(0,245,255,.3);color:var(--c);transform:translateX(4px);background:rgba(0,245,255,.06);}
.if::before{content:'✓';color:var(--c);flex-shrink:0;font-weight:700;}
.if.new{border-color:rgba(0,255,136,.2);color:rgba(0,255,136,.7);}
.if.new::before{content:'★';color:var(--g);}
.if.new:hover{border-color:rgba(0,255,136,.4);color:var(--g);}

/* ─── TRUST GRID ─── */
.trust-wrap{max-width:1000px;width:100%;margin-bottom:2rem;opacity:0;animation:fi .7s 1.4s both;}
.sttl{font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:5px;color:rgba(200,230,255,.2);text-align:center;margin-bottom:1rem;}
.trust-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.8rem;}
@media(max-width:640px){.trust-grid{grid-template-columns:repeat(2,1fr);}}
.tc{background:rgba(5,9,26,.88);border:1px solid var(--bdr);border-radius:14px;padding:1.3rem 1rem;text-align:center;transition:all .28s;cursor:none;}
.tc:hover{border-color:var(--c);transform:translateY(-5px);box-shadow:0 12px 35px rgba(0,245,255,.08);}
.tc-icon{font-size:2rem;margin-bottom:.5rem;display:block;}
.tc-name{font-family:'Orbitron',sans-serif;font-size:.6rem;letter-spacing:2px;color:#fff;margin-bottom:.3rem;}
.tc-val{font-size:.75rem;color:rgba(200,230,255,.32);}

/* ─── HOW IT WORKS ─── */
.how-wrap{max-width:1000px;width:100%;margin-bottom:2rem;}
.how-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;}
@media(max-width:600px){.how-grid{grid-template-columns:1fr;}}
.hc{background:rgba(5,9,26,.88);border:1px solid var(--bdr);border-radius:14px;padding:1.6rem;text-align:center;opacity:0;transition:all .28s;}
.hc.vis{animation:fi .5s forwards;}
.hc:hover{border-color:var(--c);transform:translateY(-6px);box-shadow:0 14px 40px rgba(0,245,255,.08);}
.hn{font-family:'Orbitron',sans-serif;font-size:3rem;font-weight:900;line-height:1;background:linear-gradient(135deg,var(--b),var(--c));-webkit-background-clip:text;-webkit-text-fill-color:transparent;opacity:.35;}
.hl{font-family:'Orbitron',sans-serif;font-size:.65rem;letter-spacing:2px;color:#fff;margin:.5rem 0;}
.hd{font-size:.8rem;color:rgba(200,230,255,.38);}

/* TICKER */
.ticker{width:100%;overflow:hidden;border-top:1px solid var(--bdr);border-bottom:1px solid var(--bdr);padding:9px 0;margin-top:2rem;background:rgba(0,245,255,.012);}
.ti{display:flex;gap:2rem;white-space:nowrap;animation:tick 32s linear infinite;font-family:'Share Tech Mono',monospace;font-size:.58rem;letter-spacing:2px;}
@keyframes tick{from{transform:translateX(0);}to{transform:translateX(-50%);}}
.ti .c1{color:rgba(0,245,255,.62);}
.ti .c2{color:rgba(255,0,136,.62);}
.ti .c3{color:rgba(0,255,136,.68);}
.ti .c4{color:rgba(255,204,0,.75);}
.ti .c5{color:rgba(119,0,255,.62);}
.div{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--bdr),transparent);}

/* ─── SCANNER SECTION ─── */
#scanner{padding:95px 2rem 5rem;max-width:1180px;margin:0 auto;position:relative;z-index:1;}
.sc-hdr{margin-bottom:2rem;}
.sc-hdr h2{font-family:'Orbitron',sans-serif;font-size:2.1rem;font-weight:900;color:#fff;opacity:0;transition:opacity .5s;}
.sc-hdr h2.vis{opacity:1;}
.sc-hdr h2 span{background:linear-gradient(135deg,var(--c),var(--b));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sc-hdr p{color:rgba(200,230,255,.36);margin-top:.4rem;letter-spacing:1px;}
.kbhint{display:inline-flex;align-items:center;gap:5px;background:rgba(0,245,255,.04);border:1px solid var(--bdr);border-radius:3px;padding:4px 10px;font-family:'Share Tech Mono',monospace;font-size:.62rem;color:rgba(200,230,255,.28);margin-top:.7rem;}
kbd{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:3px;padding:1px 5px;font-size:.6rem;color:rgba(200,230,255,.6);}

/* FILE TYPE BADGE — HUGE UPGRADE */
.ft-badge{display:none;background:rgba(5,9,26,.92);border:1px solid rgba(0,245,255,.22);border-radius:16px;padding:1.4rem 1.8rem;margin-bottom:1.5rem;animation:fi .4s;}
.ft-badge.show{display:block;}
.ft-top{display:flex;align-items:center;gap:16px;margin-bottom:1rem;}
.ft-icon-big{font-size:3rem;line-height:1;}
.ft-info .ft-type{font-family:'Orbitron',sans-serif;font-size:.82rem;font-weight:700;color:var(--c);letter-spacing:2px;}
.ft-info .ft-desc{font-size:.82rem;color:rgba(200,230,255,.48);margin-top:4px;line-height:1.5;}
.ft-meta{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.8rem;}
.ft-tag{font-family:'Share Tech Mono',monospace;font-size:.6rem;padding:4px 10px;border-radius:4px;border:1px solid;display:flex;align-items:center;gap:5px;}
.ft-tag.info{color:var(--c);border-color:rgba(0,245,255,.2);background:rgba(0,245,255,.05);}
.ft-tag.warn{color:var(--a);border-color:rgba(255,208,0,.2);background:rgba(255,208,0,.05);}
.ft-tag.danger{color:var(--r);border-color:rgba(255,26,60,.2);background:rgba(255,26,60,.05);}
.ft-tag.good{color:var(--g);border-color:rgba(0,255,136,.2);background:rgba(0,255,136,.05);}
.ft-tag::before{content:'▸';font-size:.55rem;}

/* SCAN MODE */
.mode-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;}
@media(max-width:500px){.mode-row{grid-template-columns:1fr;}}
.mc{background:rgba(5,9,26,.88);border:2px solid var(--bdr);border-radius:14px;padding:1.2rem 1.4rem;cursor:none;transition:all .2s;display:flex;align-items:center;gap:14px;}
.mc:hover{border-color:var(--b);background:rgba(26,95,255,.04);transform:translateY(-2px);}
.mc.active{border-color:var(--c);background:rgba(0,245,255,.04);box-shadow:0 0 35px rgba(0,245,255,.1),inset 0 0 35px rgba(0,245,255,.02);}
.mc-icon{font-size:1.9rem;flex-shrink:0;}
.mc-name{font-family:'Orbitron',sans-serif;font-size:.72rem;font-weight:700;color:#fff;}
.mc-desc{font-size:.76rem;color:rgba(200,230,255,.38);margin-top:2px;}

/* INPUTS */
.input-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem;}
@media(max-width:700px){.input-grid{grid-template-columns:1fr;}}
.ip{display:flex;flex-direction:column;}
.ip-lbl{font-family:'Share Tech Mono',monospace;font-size:.55rem;letter-spacing:3px;color:rgba(200,230,255,.28);margin-bottom:.5rem;}
.code-area{background:#040710;border:1px solid var(--bdr);border-radius:10px;color:#8bbeff;font-family:'Share Tech Mono',monospace;font-size:.76rem;padding:1rem;resize:none;flex:1;min-height:230px;outline:none;transition:border-color .2s,box-shadow .2s;line-height:1.65;}
.code-area:focus{border-color:var(--b);box-shadow:0 0 0 2px rgba(26,95,255,.1);}
.cc{font-family:'Share Tech Mono',monospace;font-size:.58rem;color:rgba(200,230,255,.18);text-align:right;margin-top:5px;}
.dz{background:rgba(0,245,255,.02);border:2px dashed rgba(0,245,255,.16);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:230px;cursor:none;transition:all .22s;position:relative;overflow:hidden;padding:2rem;text-align:center;}
.dz:hover,.dz.drag{border-color:var(--c);background:rgba(0,245,255,.04);box-shadow:0 0 50px rgba(0,245,255,.07);}
.dz input{position:absolute;inset:0;opacity:0;cursor:none;}
.di{font-size:3rem;margin-bottom:.8rem;transition:transform .3s;filter:drop-shadow(0 0 12px var(--c));}
.dz:hover .di{transform:scale(1.2) translateY(-5px);}
.dt{font-family:'Orbitron',sans-serif;font-size:.65rem;letter-spacing:2px;color:rgba(200,230,255,.38);}
.ds{font-family:'Share Tech Mono',monospace;font-size:.68rem;color:rgba(200,230,255,.2);margin-top:5px;}
.fll{display:none;flex-direction:column;align-items:center;gap:5px;}
.fll.show{display:flex;}
.fl-check{font-size:2.8rem;animation:popIn .4s ease;}
@keyframes popIn{from{transform:scale(0) rotate(-20deg);}to{transform:scale(1) rotate(0);}}
.fl-nm{font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--g);}
.fl-sz{font-family:'Share Tech Mono',monospace;font-size:.65rem;color:rgba(200,230,255,.3);}
.fl-rm{background:rgba(255,26,60,.08);border:1px solid rgba(255,26,60,.22);color:var(--r);font-family:'Share Tech Mono',monospace;font-size:.6rem;padding:4px 11px;border-radius:3px;cursor:none;margin-top:4px;transition:all .2s;}
.fl-rm:hover{background:rgba(255,26,60,.18);}

/* SCAN BUTTON — ULTIMATE */
.scan-btn{width:100%;padding:20px;border:none;border-radius:12px;cursor:none;font-family:'Orbitron',sans-serif;font-size:.95rem;font-weight:900;letter-spacing:5px;position:relative;overflow:hidden;transition:all .15s;margin-bottom:1.5rem;color:#fff;
background:linear-gradient(90deg,#0a1840,#0f2860,var(--b),var(--c),var(--b),#0f2860,#0a1840);background-size:300%;
animation:sbgl 2.5s ease-in-out infinite,sbbg 8s linear infinite;}
@keyframes sbgl{0%,100%{box-shadow:0 0 35px rgba(0,245,255,.4),0 0 70px rgba(26,95,255,.2);}50%{box-shadow:0 0 70px rgba(0,245,255,.9),0 0 140px rgba(26,95,255,.4);}}
@keyframes sbbg{from{background-position:0%;}to{background-position:300%;}}
.scan-btn:hover{transform:scale(1.02);animation:sbbg 8s linear infinite;box-shadow:0 0 120px rgba(0,245,255,1)!important;}
.scan-btn:active{transform:scale(.96);}
.scan-btn:disabled{opacity:.35;cursor:not-allowed;animation:none;background:#0a1840;}
.scan-btn .btxt{display:flex;align-items:center;justify-content:center;gap:12px;}
.scan-btn .btxt .icon{font-size:1.2rem;animation:iconbounce 1.5s ease-in-out infinite;}
@keyframes iconbounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}
.scan-btn.scanning .btxt{display:none;}
.spinner{display:none;width:24px;height:24px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.scan-btn.scanning .spinner{display:block;}

/* PROGRESS */
.prog{display:none;background:rgba(5,9,26,.92);border:1px solid var(--bdr);border-radius:12px;padding:1.3rem;margin-bottom:1.5rem;}
.prog.show{display:block;}
.prog-stage{font-family:'Share Tech Mono',monospace;font-size:.62rem;letter-spacing:2px;color:var(--c);margin-bottom:.8rem;display:flex;align-items:center;gap:8px;}
.prog-stage::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--c);animation:blink .7s infinite;}
.pbg{background:rgba(255,255,255,.04);border-radius:50px;height:6px;overflow:hidden;}
.pf{height:100%;background:linear-gradient(90deg,var(--b),var(--c),var(--pk),var(--pu));border-radius:50px;width:0;transition:width .4s ease;background-size:200%;animation:pfgl 2s linear infinite;}
@keyframes pfgl{from{background-position:0%;}to{background-position:200%;}}
.ppct{font-family:'Share Tech Mono',monospace;font-size:.65rem;color:rgba(200,230,255,.3);text-align:right;margin-top:4px;}

/* ─── RESULTS ─── */
#results{display:none;}
#results.show{display:block;animation:fi .5s ease;}

/* GAUGE */
.gauge-section{background:rgba(5,9,26,.92);border:1px solid var(--bdr);border-radius:18px;padding:2rem;text-align:center;margin-bottom:1.5rem;position:relative;overflow:hidden;}
.gauge-section::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 100%,rgba(0,245,255,.04),transparent 60%);}
.gauge-section::after{content:'⬡ LUNOR RISK ANALYSIS ⬡';position:absolute;top:1rem;left:50%;transform:translateX(-50%);font-family:'Share Tech Mono',monospace;font-size:.55rem;letter-spacing:4px;color:rgba(200,230,255,.2);}
.gsvg{display:block;margin:0 auto;}
.gbg{fill:none;stroke:rgba(255,255,255,.05);stroke-width:14;stroke-linecap:round;}
.gfg{fill:none;stroke-width:14;stroke-linecap:round;stroke-dasharray:345;stroke-dashoffset:345;transition:stroke-dashoffset 2s cubic-bezier(.4,0,.2,1),stroke .8s;}
.gtxt{font-family:'Orbitron',sans-serif;font-size:3.4rem;font-weight:900;fill:#fff;text-anchor:middle;dominant-baseline:middle;}
.glvl{font-family:'Share Tech Mono',monospace;font-size:.85rem;fill:rgba(200,230,255,.45);text-anchor:middle;dominant-baseline:middle;letter-spacing:3px;}
.gauge-desc{font-family:'Share Tech Mono',monospace;font-size:.72rem;letter-spacing:2px;margin-top:1rem;padding:7px 22px;border-radius:50px;border:1px solid;display:inline-block;}

/* RESULTS SUMMARY GRID */
.rg{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:.8rem;margin-bottom:1.5rem;}
.rc{background:rgba(5,9,26,.88);border:1px solid var(--bdr);border-radius:12px;padding:.9rem;text-align:center;transition:all .2s;cursor:none;}
.rc:hover{border-color:rgba(0,245,255,.35);transform:translateY(-3px);}
.rv{font-family:'Orbitron',sans-serif;font-size:1.3rem;font-weight:700;color:#fff;}
.rl{font-family:'Share Tech Mono',monospace;font-size:.55rem;letter-spacing:1px;color:rgba(200,230,255,.25);margin-top:4px;}

/* ALL CLEAR */
.all-clear{text-align:center;padding:3rem 2rem;background:rgba(0,255,136,.04);border:1px solid rgba(0,255,136,.14);border-radius:16px;margin-bottom:1.5rem;display:none;}
.all-clear.show{display:block;animation:fi .5s ease;}
.ac-icon{font-size:5rem;animation:popIn .6s .2s both;}
.ac-txt{font-family:'Orbitron',sans-serif;font-size:2rem;font-weight:900;color:var(--g);margin-top:1rem;}
.ac-sub{font-family:'Share Tech Mono',monospace;font-size:.7rem;letter-spacing:2px;color:rgba(0,255,136,.45);margin-top:.5rem;}

/* TOP BAR */
.top-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.8rem;background:rgba(255,26,60,.04);border:1px solid rgba(255,26,60,.15);border-radius:14px;padding:1.1rem 1.4rem;margin-bottom:1.2rem;}
.tb-l{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.tbt{font-family:'Orbitron',sans-serif;font-size:.78rem;font-weight:700;color:var(--r);display:flex;align-items:center;gap:8px;}
.tbt::before{content:'⚠';animation:warn 1s ease-in-out infinite;}
@keyframes warn{0%,100%{opacity:1;}50%{opacity:.25;}}
.tcb{font-family:'Share Tech Mono',monospace;font-size:.56rem;padding:3px 8px;border-radius:3px;}
.tcb.critical{background:rgba(255,26,60,.14);color:var(--r);border:1px solid rgba(255,26,60,.26);}
.tcb.high{background:rgba(255,102,0,.14);color:var(--o);border:1px solid rgba(255,102,0,.26);}
.tcb.medium{background:rgba(255,208,0,.14);color:var(--a);border:1px solid rgba(255,208,0,.26);}
.tcb.low{background:rgba(26,95,255,.14);color:var(--b);border:1px solid rgba(26,95,255,.26);}
.tb-r{display:flex;gap:.5rem;flex-wrap:wrap;}
.ab{font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:1px;padding:8px 14px;border-radius:6px;cursor:none;display:flex;align-items:center;gap:6px;position:relative;overflow:hidden;transition:all .15s;}
.ab.dl{background:linear-gradient(135deg,rgba(0,255,136,.12),rgba(0,255,136,.04));border:1px solid rgba(0,255,136,.28);color:var(--g);animation:dlpulse 2.5s ease-in-out infinite;}
@keyframes dlpulse{0%,100%{box-shadow:0 0 8px rgba(0,255,136,.12);}50%{box-shadow:0 0 25px rgba(0,255,136,.45);}}
.ab.dl:hover{transform:scale(1.08);box-shadow:0 0 50px rgba(0,255,136,.75)!important;animation:none;}
.ab.dl:disabled{opacity:.22;cursor:not-allowed;animation:none;}
.ab.cp{background:rgba(26,95,255,.07);border:1px solid var(--bdr);color:var(--b);}
.ab.cp:hover{background:rgba(26,95,255,.18);border-color:var(--b);transform:scale(1.05);}
.ab.cp.done{background:rgba(0,255,136,.08);border-color:rgba(0,255,136,.3);color:var(--g);}
.ab.sh{background:rgba(255,0,136,.06);border:1px solid rgba(255,0,136,.22);color:var(--pk);}
.ab.sh:hover{background:rgba(255,0,136,.16);border-color:var(--pk);transform:scale(1.05);}

/* FILTER */
.filter-row{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1.2rem;align-items:center;}
.fl-lbl{font-family:'Share Tech Mono',monospace;font-size:.55rem;letter-spacing:2px;color:rgba(200,230,255,.22);margin-right:3px;}
.fb{background:rgba(255,255,255,.03);border:1px solid var(--bdr);color:rgba(200,230,255,.38);font-family:'Share Tech Mono',monospace;font-size:.56rem;letter-spacing:1px;padding:5px 12px;border-radius:50px;cursor:none;transition:all .15s;}
.fb:hover{border-color:var(--b);color:var(--b);}
.fb.on{background:rgba(26,95,255,.12);border-color:var(--b);color:var(--b);}
.fb.on.cr{background:rgba(255,26,60,.1);border-color:var(--r);color:var(--r);}
.fb.on.hi{background:rgba(255,102,0,.1);border-color:var(--o);color:var(--o);}
.fb.on.me{background:rgba(255,208,0,.1);border-color:var(--a);color:var(--a);}
.exall{background:rgba(0,245,255,.03);border:1px solid var(--bdr);color:rgba(0,245,255,.4);font-family:'Share Tech Mono',monospace;font-size:.56rem;padding:5px 12px;border-radius:50px;cursor:none;transition:all .15s;margin-left:auto;}
.exall:hover{border-color:var(--c);color:var(--c);}

/* THREAT CARDS */
.tlist{margin-bottom:1.5rem;}
.threat-card{background:rgba(5,9,26,.88);border:1px solid rgba(255,26,60,.13);border-radius:14px;margin-bottom:.7rem;overflow:hidden;transition:all .22s;position:relative;}
.threat-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px;}
.threat-card.critical::before{background:linear-gradient(180deg,var(--r),rgba(255,26,60,.3));}
.threat-card.high::before{background:linear-gradient(180deg,var(--o),rgba(255,102,0,.3));}
.threat-card.medium::before{background:linear-gradient(180deg,var(--a),rgba(255,208,0,.3));}
.threat-card.low::before{background:linear-gradient(180deg,var(--b),rgba(26,95,255,.3));}
.threat-card:hover{transform:translateX(5px);}
.threat-card.high{border-color:rgba(255,102,0,.17);}
.threat-card.medium{border-color:rgba(255,208,0,.15);}
.threat-card.low{border-color:rgba(26,95,255,.17);}
.th{display:flex;align-items:center;gap:10px;padding:13px 18px 13px 22px;cursor:none;user-select:none;transition:background .2s;}
.th:hover{background:rgba(255,255,255,.01);}
.rb{font-family:'Share Tech Mono',monospace;font-size:.5rem;letter-spacing:1px;padding:3px 8px;border-radius:3px;white-space:nowrap;flex-shrink:0;font-weight:700;}
.rb.critical{background:rgba(255,26,60,.14);color:var(--r);border:1px solid rgba(255,26,60,.26);}
.rb.high{background:rgba(255,102,0,.14);color:var(--o);border:1px solid rgba(255,102,0,.26);}
.rb.medium{background:rgba(255,208,0,.14);color:var(--a);border:1px solid rgba(255,208,0,.26);}
.rb.low{background:rgba(26,95,255,.14);color:var(--b);border:1px solid rgba(26,95,255,.26);}
.tn{font-family:'Orbitron',sans-serif;font-size:.72rem;font-weight:700;color:#fff;flex:1;}
.tline{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:rgba(200,230,255,.25);white-space:nowrap;}
.ta{font-size:.9rem;color:var(--c);margin-left:8px;transition:transform .3s;flex-shrink:0;animation:arb 2s ease-in-out infinite;}
@keyframes arb{0%,100%{transform:translateY(0);}50%{transform:translateY(5px);}}
.threat-card.open .ta{transform:rotate(180deg)!important;animation:none;}
.tb-body{max-height:0;overflow:hidden;transition:max-height .4s ease;border-top:0 solid var(--bdr);}
.threat-card.open .tb-body{max-height:800px;border-top-width:1px;}
.tb-inner{padding:16px 18px 16px 22px;}
.te{font-size:.86rem;color:rgba(200,230,255,.75);margin-bottom:.9rem;line-height:1.68;}
.td{border-left:3px solid;padding:9px 14px;border-radius:0 6px 6px 0;margin-bottom:.9rem;font-size:.8rem;}
.threat-card.critical .td{border-left-color:var(--r);color:rgba(255,140,140,.88);background:rgba(255,26,60,.05);}
.threat-card.high .td{border-left-color:var(--o);color:rgba(255,165,90,.88);background:rgba(255,102,0,.05);}
.threat-card.medium .td{border-left-color:var(--a);color:rgba(255,200,80,.88);background:rgba(255,208,0,.05);}
.threat-card.low .td{border-left-color:var(--b);color:rgba(130,180,255,.88);background:rgba(26,95,255,.05);}
.cblk{background:#030509;border:1px solid var(--bdr);border-radius:8px;padding:12px;font-family:'Share Tech Mono',monospace;font-size:.72rem;overflow-x:auto;margin-bottom:.9rem;}
.cl{padding:2px 0;color:rgba(145,175,220,.42);}
.cl.flagged{color:var(--r);background:rgba(255,26,60,.07);padding:2px 7px;margin:0 -7px;border-radius:3px;font-weight:700;}
.tav{display:flex;align-items:flex-start;gap:10px;background:rgba(255,255,255,.016);border-radius:7px;padding:10px 13px;}
.tai{font-size:1rem;flex-shrink:0;}
.tat{font-family:'Share Tech Mono',monospace;font-size:.7rem;color:rgba(200,230,255,.55);}

/* BOTTOM ACTIONS */
.bot{display:grid;grid-template-columns:1fr auto;gap:1rem;align-items:center;margin-top:1.2rem;}
@media(max-width:500px){.bot{grid-template-columns:1fr;}}
.dlbtn{padding:15px 20px;border-radius:9px;cursor:none;font-family:'Orbitron',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:2px;transition:all .15s;background:linear-gradient(135deg,rgba(0,255,136,.1),rgba(0,255,136,.03));border:1px solid rgba(0,255,136,.2);color:var(--g);}
.dlbtn:hover{transform:scale(1.03);box-shadow:0 0 40px rgba(0,255,136,.55);}
.dlbtn:disabled{opacity:.2;cursor:not-allowed;}
.rescan{padding:13px 20px;border:1px solid var(--bdr);border-radius:9px;background:transparent;color:rgba(200,230,255,.32);cursor:none;font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:2px;transition:all .2s;white-space:nowrap;}
.rescan:hover{border-color:var(--b);color:var(--b);}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(14px);z-index:900;display:none;align-items:center;justify-content:center;padding:2rem;}
.mo.show{display:flex;}
.mod{background:#05091a;border:1px solid var(--bdr);border-radius:18px;max-width:700px;width:100%;max-height:82vh;overflow:hidden;display:flex;flex-direction:column;animation:fi .3s ease;}
.mod-h{padding:1.2rem 1.5rem;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;}
.mod-t{font-family:'Orbitron',sans-serif;font-size:.76rem;font-weight:700;color:#fff;}
.mod-x{background:none;border:none;color:rgba(200,230,255,.3);font-size:1.4rem;cursor:none;transition:color .2s;line-height:1;}
.mod-x:hover{color:#fff;}
.mod-b{overflow-y:auto;padding:1.2rem 1.5rem;flex:1;}
.hem{text-align:center;padding:3rem;color:rgba(200,230,255,.22);font-family:'Share Tech Mono',monospace;font-size:.8rem;}
.hi-item{background:rgba(255,255,255,.02);border:1px solid var(--bdr);border-radius:10px;padding:1rem;margin-bottom:.7rem;transition:all .2s;}
.hi-item:hover{border-color:var(--b);background:rgba(26,95,255,.04);}
.hi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.hi-fn{font-family:'Orbitron',sans-serif;font-size:.68rem;color:#fff;}
.hi-dt{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:rgba(200,230,255,.2);}
.hi-row{display:flex;gap:5px;flex-wrap:wrap;}

/* TOAST */
.toast{position:fixed;bottom:2rem;right:2rem;background:#050916;border:1px solid var(--bdr);border-radius:10px;padding:11px 18px;font-family:'Share Tech Mono',monospace;font-size:.63rem;letter-spacing:1px;color:#fff;z-index:1000;transform:translateY(100px);opacity:0;transition:all .32s cubic-bezier(.4,0,.2,1);box-shadow:0 18px 55px rgba(0,0,0,.6);}
.toast.show{transform:translateY(0);opacity:1;}
.toast.g{border-color:rgba(0,255,136,.35);color:var(--g);}
.toast.r{border-color:rgba(255,26,60,.35);color:var(--r);}
.toast.b{border-color:rgba(26,95,255,.35);color:var(--b);}

   10 GAME-BREAKING FEATURES CSS
══════════════════════════════════════ */

/* GB1: HACKER TERMINAL LIVE FEED */
#terminalPanel{position:fixed;bottom:0;right:0;width:380px;background:rgba(1,4,10,.97);border:1px solid rgba(0,245,255,.2);border-radius:18px 0 0 0;z-index:750;transform:translateY(calc(100% - 42px));transition:transform .4s cubic-bezier(.4,0,.2,1);backdrop-filter:blur(30px);overflow:hidden;}
#terminalPanel.open{transform:translateY(0);}
.term-tab{display:flex;align-items:center;gap:8px;padding:10px 16px;cursor:none;border-bottom:1px solid rgba(0,245,255,.08);background:rgba(0,245,255,.03);}
.term-tab-dot{width:6px;height:6px;border-radius:50%;background:var(--g);box-shadow:0 0 8px var(--g);animation:blink .8s infinite;}
.term-tab-lbl{font-family:'Share Tech Mono',monospace;font-size:.58rem;letter-spacing:3px;color:rgba(0,245,255,.6);flex:1;}
.term-tab-arr{font-size:.8rem;color:rgba(0,245,255,.4);transition:transform .4s;}
#terminalPanel.open .term-tab-arr{transform:rotate(180deg);}
.term-body{height:240px;overflow-y:auto;padding:8px 0;}
.term-body::-webkit-scrollbar{width:2px;}.term-body::-webkit-scrollbar-thumb{background:rgba(0,245,255,.2);}
.tl{padding:3px 14px;font-family:'Share Tech Mono',monospace;font-size:.62rem;line-height:1.5;display:flex;gap:8px;align-items:flex-start;}
.tl .tl-time{color:rgba(200,230,255,.18);flex-shrink:0;font-size:.55rem;}
.tl .tl-msg{flex:1;}
.tl.ok .tl-msg{color:rgba(0,255,136,.75);}
.tl.warn .tl-msg{color:rgba(255,208,0,.85);}
.tl.err .tl-msg{color:rgba(255,26,60,.9);}
.tl.info .tl-msg{color:rgba(0,245,255,.65);}
.tl.sys .tl-msg{color:rgba(200,230,255,.35);}
.term-input-row{display:flex;align-items:center;padding:6px 14px;border-top:1px solid rgba(0,245,255,.08);gap:6px;}
.term-prompt{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--g);}
.term-inp{flex:1;background:none;border:none;outline:none;font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--c);caret-color:var(--c);}

/* GB2: THREAT DNA VISUALIZER */
#dnaPanel{display:none;background:rgba(5,9,26,.95);border:1px solid var(--bdr);border-radius:16px;padding:1.5rem;margin-bottom:1.5rem;position:relative;overflow:hidden;}
#dnaPanel.show{display:block;animation:fi .5s ease;}
.dna-title{font-family:'Orbitron',sans-serif;font-size:.65rem;letter-spacing:3px;color:var(--pk);margin-bottom:1rem;display:flex;align-items:center;gap:8px;}
.dna-title::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--pk);box-shadow:0 0 10px var(--pk);animation:blink .9s infinite;}
#dnaCanvas{display:block;width:100%;height:120px;border-radius:8px;}

/* GB3: AI THREAT EXPLANATION CHAT */
#aiPanel{display:none;background:rgba(5,9,26,.95);border:1px solid rgba(119,0,255,.25);border-radius:16px;margin-bottom:1.5rem;overflow:hidden;}
#aiPanel.show{display:block;animation:fi .4s ease;}
.ai-hdr{padding:10px 16px;background:linear-gradient(90deg,rgba(119,0,255,.1),rgba(255,0,136,.06));border-bottom:1px solid rgba(119,0,255,.18);display:flex;align-items:center;gap:10px;}
.ai-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--pu),var(--pk));display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0;}
.ai-name{font-family:'Orbitron',sans-serif;font-size:.62rem;letter-spacing:2px;color:var(--pu);}
.ai-status{font-family:'Share Tech Mono',monospace;font-size:.5rem;color:rgba(119,0,255,.5);margin-top:1px;}
.ai-messages{padding:1rem;max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:.7rem;}
.ai-msg{padding:9px 12px;border-radius:10px;font-family:'Rajdhani',sans-serif;font-size:.85rem;line-height:1.6;max-width:88%;}
.ai-msg.bot{background:rgba(119,0,255,.1);border:1px solid rgba(119,0,255,.18);color:rgba(200,230,255,.78);align-self:flex-start;border-radius:4px 10px 10px 10px;}
.ai-msg.usr{background:rgba(0,245,255,.06);border:1px solid rgba(0,245,255,.14);color:var(--c);align-self:flex-end;border-radius:10px 4px 10px 10px;}
.ai-typing{display:flex;gap:4px;padding:10px 12px;}
.ai-typing span{width:6px;height:6px;border-radius:50%;background:var(--pu);animation:typ .9s ease-in-out infinite;}
.ai-typing span:nth-child(2){animation-delay:.18s;}
.ai-typing span:nth-child(3){animation-delay:.36s;}
@keyframes typ{0%,80%,100%{transform:scale(.7);opacity:.4;}40%{transform:scale(1);opacity:1;}}
.ai-inp-row{display:flex;border-top:1px solid rgba(119,0,255,.14);gap:0;}
.ai-inp{flex:1;background:rgba(119,0,255,.04);border:none;outline:none;padding:10px 14px;font-family:'Share Tech Mono',monospace;font-size:.65rem;color:rgba(200,230,255,.7);cursor:none;}
.ai-send{background:linear-gradient(135deg,var(--pu),var(--pk));border:none;padding:0 16px;color:#fff;font-family:'Orbitron',sans-serif;font-size:.58rem;cursor:none;letter-spacing:1px;}
.ai-send:hover{filter:brightness(1.2);}

/* GB4: ANIMATED THREAT MAP (code heatmap) */
#heatmapWrap{display:none;background:rgba(5,9,26,.95);border:1px solid var(--bdr);border-radius:14px;margin-bottom:1.5rem;overflow:hidden;}
#heatmapWrap.show{display:block;animation:fi .4s ease;}
.hm-hdr{padding:10px 16px;border-bottom:1px solid var(--bdr);font-family:'Share Tech Mono',monospace;font-size:.58rem;letter-spacing:3px;color:rgba(200,230,255,.3);display:flex;align-items:center;gap:8px;}
.hm-hdr::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--r);box-shadow:0 0 8px var(--r);animation:blink .8s infinite;}
#heatmapCanvas{display:block;width:100%;height:80px;image-rendering:pixelated;}
.hm-legend{display:flex;gap:.5rem;padding:8px 16px;align-items:center;flex-wrap:wrap;}
.hml{display:flex;align-items:center;gap:4px;font-family:'Share Tech Mono',monospace;font-size:.52rem;color:rgba(200,230,255,.35);}
.hml-dot{width:8px;height:8px;border-radius:2px;}

/* GB5: SOUND EFFECTS TOGGLE */
#soundBtn{position:fixed;top:76px;right:1.2rem;z-index:790;background:rgba(5,9,26,.9);border:1px solid var(--bdr);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;cursor:none;transition:all .2s;backdrop-filter:blur(12px);}
#soundBtn:hover{border-color:var(--c);box-shadow:0 0 18px rgba(0,245,255,.25);transform:scale(1.1);}

/* GB6: MULTI-FILE QUEUE */
